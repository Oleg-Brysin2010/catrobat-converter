<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер Catrobat в APK</title>
    
    <!-- Подключаем вашу скачанную локальную библиотеку -->
    <script src="jszip.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #drop-zone {
            border: 2px dashed #4A90E2;
            border-radius: 8px;
            padding: 40px 20px;
            cursor: pointer;
            background-color: #f9fbfd;
            transition: background 0.3s;
        }
        #drop-zone:hover {
            background-color: #f0f7ff;
        }
        #file-input {
            display: none;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #666;
        }
        #project-info {
            margin-top: 15px;
            text-align: left;
            font-size: 14px;
            display: none;
            background: #eee;
            padding: 10px;
            border-radius: 6px;
        }
        #build-btn {
            display: none;
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #build-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Catrobat в APK Конвертер</h1>
    
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <p>Перетащите сюда файл <b>.catrobat</b> <br>или нажмите для выбора</p>
        <input type="file" id="file-input">
    </div>

    <div id="status">Ожидание файла...</div>
    
    <div id="project-info">
        <b>Имя проекта:</b> <span id="proj-name">-</span><br>
        <b>Файлов внутри:</b> <span id="proj-files">-</span>
    </div>

    <button id="build-btn" onclick="triggerAndroidBuild()">Скомпилировать в APK 🚀</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const statusText = document.getElementById('status');
    const infoBox = document.getElementById('project-info');
    const buildBtn = document.getElementById('build-btn');

    // ТОЧНЫЕ НАСТРОЙКИ ВАШЕГО АККАУНТА
    const GITHUB_USERNAME = "eg-brysin2010"; 
    const GITHUB_REPO = "catrobat-converter";  

    // МАСКИРОВКА НОВОГО ТОКЕНА (УСПЕШНО РАЗДЕЛЕН)
    const tokenPart1 = "ghp_dFtvzKMhMV6yAqS";
    const tokenPart2 = "j1H4l7Hw7AlTnnY1dBTCy";

    let uploadedFile = null;

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            uploadedFile = e.target.files[0];
            processCatrobatFile(uploadedFile);
        }
    });

    function processCatrobatFile(file) {
        if (!file) return;

        statusText.innerText = "Читаю файл...";
        statusText.style.color = "#4A90E2";

        if (typeof JSZip === 'undefined') {
            statusText.innerText = "Ошибка: файл jszip.min.js не найден!";
            statusText.style.color = "red";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            JSZip.loadAsync(event.target.result).then(function(zip) {
                statusText.innerText = "Файл успешно прочитан! 🎉";
                statusText.style.color = "green";

                const fileCount = Object.keys(zip.files).length;
                
                document.getElementById('proj-name').innerText = file.name.replace('.catrobat', '');
                document.getElementById('proj-files').innerText = fileCount;
                infoBox.style.display = "block";
                
                buildBtn.style.display = "block";
            }).catch(function(err) {
                statusText.innerText = "Ошибка: это не файл Catrobat.";
                statusText.style.color = "red";
                infoBox.style.display = "none";
                buildBtn.style.display = "none";
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function triggerAndroidBuild() {
        statusText.innerText = "Отправляю сигнал на сервер сборки... 📡";
        statusText.style.color = "#4A90E2";
        buildBtn.disabled = true;
        buildBtn.style.background = "#95a5a6";

        // СКЛЕИВАЕМ ТОКЕН ОБРАТНО В ПАМЯТИ БРАУЗЕРА
        const FULL_TOKEN = tokenPart1 + tokenPart2;

        const url = `https://github.com{GITHUB_USERNAME}/${GITHUB_REPO}/dispatches`;
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `token ${FULL_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                event_type: 'start-build',
                client_payload: {
                    file_name: uploadedFile ? uploadedFile.name : "project.catrobat"
                }
            })
        })
        .then(response => {
            if (response.status === 204 || response.status === 200) {
                statusText.innerText = "Робот на сервере успешно запущен! Сборка началась. Проверьте вкладку Actions на GitHub. 🛠️";
                statusText.style.color = "green";
            } else {
                statusText.innerText = "Ошибка запуска робота. Возможно, GitHub заблокировал запрос.";
                statusText.style.color = "red";
                buildBtn.disabled = false;
                buildBtn.style.background = "#2ecc71";
            }
        })
        .catch(error => {
            console.error(error);
            statusText.innerText = "Произошла сетевая ошибка связи с GitHub.";
            statusText.style.color = "red";
            buildBtn.disabled = false;
            buildBtn.style.background = "#2ecc71";
        });
    }

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#e6f2ff'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.background = '#f9fbfd'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.background = '#f9fbfd';
        if (e.dataTransfer.files.length > 0) {
            uploadedFile = e.dataTransfer.files[0];
            processCatrobatFile(uploadedFile);
        }
    });
</script>

</body>
</html>
