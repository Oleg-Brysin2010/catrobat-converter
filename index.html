<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер Catrobat в APK</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #drop-zone {
            border: 2px dashed #4A90E2;
            border-radius: 8px;
            padding: 40px 20px;
            cursor: pointer;
            background-color: #f9fbfd;
            transition: background 0.3s;
        }
        #drop-zone:hover {
            background-color: #f0f7ff;
        }
        #file-input {
            display: none;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #666;
        }
        #project-info {
            margin-top: 15px;
            text-align: left;
            font-size: 14px;
            display: none;
            background: #eee;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Catrobat в APK Конвертер</h1>
    
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <p>Перетащите сюда файл <b>.catrobat</b> <br>или нажмите для выбора</p>
        <input type="file" id="file-input" accept=".catrobat,.zip">
    </div>

    <div id="status">Ожидание файла...</div>
    <div id="project-info">
        <b>Имя проекта:</b> <span id="proj-name">-</span><br>
        <b>Файлов внутри:</b> <span id="proj-files">-</span>
    </div>
</div>

<!-- ЛОГИКА ВЗАИМОДЕЙСТВИЯ С ФАЙЛОМ -->
<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const statusText = document.getElementById('status');
    const infoBox = document.getElementById('project-info');

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            processCatrobatFile(e.target.files[0]);
        }
    });

    function processCatrobatFile(file) {
        statusText.innerText = "Читаю файл...";
        statusText.style.color = "#4A90E2";

        // Запуск полноценного JSZip, который теперь встроен целиком
        JSZip.loadAsync(file).then(function(zip) {
            statusText.innerText = "Файл успешно прочитан! 🎉";
            statusText.style.color = "green";

            const fileCount = Object.keys(zip.files).length;
            
            document.getElementById('proj-name').innerText = file.name.replace('.catrobat', '');
            document.getElementById('proj-files').innerText = fileCount;
            infoBox.style.display = "block";
        }).catch(function(err) {
            statusText.innerText = "Ошибка: это не верный файл Catrobat или архив поврежден";
            statusText.style.color = "red";
            console.error(err);
        });
    }

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#e6f2ff'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.background = '#f9fbfd'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.background = '#f9fbfd';
        if (e.dataTransfer.files.length > 0) {
            processCatrobatFile(e.dataTransfer.files[0]);
        }
    });
</script>

</body>
</html>
