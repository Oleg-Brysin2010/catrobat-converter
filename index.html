<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер Catrobat в APK</title>
    
    <script src="jszip.min.js" defer></script>
    
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

<div class="container">
    <h1>Catrobat в APK Конвертер</h1>
    
    <div id="drop-zone">
        <p>Перетащите сюда файл <b>.catrobat</b> <br>или нажмите для выбора</p>
        <input type="file" id="file-input" accept=".catrobat">
    </div>
    
    <div id="status">Ожидание файла...</div>
    
    <div id="project-info">
        <b>Имя проекта:</b> <span id="proj-name">-</span><br>
        <b>Файлов внутри:</b> <span id="proj-files">-</span>
    </div>
    
    <button id="build-btn">Скомпилировать в APK 🚀</button>
</div>

</body>
</html>
