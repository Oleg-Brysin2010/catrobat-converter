<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер Catrobat в APK</title>
    <script src="jszip.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; }
        #drop-zone { border: 2px dashed #4A90E2; border-radius: 8px; padding: 40px 20px; cursor: pointer; background-color: #f9fbfd; transition: background 0.3s; }
        #drop-zone:hover { background-color: #f0f7ff; }
        #file-input { display: none; }
        #status { margin-top: 20px; font-weight: bold; color: #666; }
        #project-info { margin-top: 15px; text-align: left; font-size: 14px; display: none; background: #eee; padding: 10px; border-radius: 6px; }
        
        button, .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 20px; text-decoration: none; text-align: center; display: none; }
        #build-btn { background-color: #2ecc71; color: white; }
        #build-btn:hover { background-color: #27ae60; }
        
        #download-btn { background-color: #3498db; color: white; display: none; animation: pulse 1.5s infinite; }
        #download-btn:hover { background-color: #2980b9; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Catrobat в APK Конвертер</h1>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <p>Перетащите сюда файл <b>.catrobat</b> <br>или нажмите для выбора</p>
        <input type="file" id="file-input">
    </div>
    
    <div id="status">Ожидание файла...</div>
    
    <div id="project-info">
        <b>Имя проекта:</b> <span id="proj-name">-</span><br>
        <b>Файлов внутри:</b> <span id="proj-files">-</span>
    </div>
    
    <button id="build-btn" onclick="triggerAndroidBuild()">Скомпилировать в APK 🚀</button>
    <a id="download-btn" class="btn" href="#" download>Скачать готовый APK! 💾</a>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const statusText = document.getElementById('status');
    const infoBox = document.getElementById('project-info');
    const buildBtn = document.getElementById('build-btn');
    const downloadBtn = document.getElementById('download-btn');

    const GITHUB_USERNAME = "eg-brysin2010"; 
    const GITHUB_REPO = "catrobat-converter";  
    
    // ССЫЛКА НА ВАШ ТОЧНЫЙ РАБОТАЮЩИЙ СЕРВЕР:
    const SERVER_URL = "https://hf.space";

    let uploadedFile = null;

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            uploadedFile = e.target.files[0];
            processCatrobatFile(uploadedFile);
        }
    });

    function processCatrobatFile(file) {
        if (!file) return;
        statusText.innerText = "Читаю файл...";
        statusText.style.color = "#4A90E2";

        const reader = new FileReader();
        reader.onload = function(event) {
            JSZip.loadAsync(event.target.result).then(function(zip) {
                statusText.innerText = "Файл успешно прочитан! 🎉";
                statusText.style.color = "green";
                document.getElementById('proj-name').innerText = file.name.replace('.catrobat', '');
                document.getElementById('proj-files').innerText = Object.keys(zip.files).length;
                infoBox.style.display = "block";
                buildBtn.style.display = "block";
                downloadBtn.style.display = "none";
            }).catch(() => {
                statusText.innerText = "Ошибка разбора файла.";
                statusText.style.color = "red";
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function triggerAndroidBuild() {
        statusText.innerText = "Запускаем компиляцию через сервер... 📡";
        statusText.style.color = "#4A90E2";
        buildBtn.disabled = true;
        buildBtn.style.background = "#95a5a6";

        fetch(SERVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_name: uploadedFile ? uploadedFile.name : "project.catrobat" })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                statusText.innerText = "Сборка началась! Робот трудится на сервере. Подождите около 1-2 минут... ⏳";
                buildBtn.style.display = "none";
                checkForReadyAPK();
            } else {
                statusText.innerText = "Ошибка запуска: " + data.message;
                statusText.style.color = "red";
                buildBtn.disabled = false;
                buildBtn.style.background = "#2ecc71";
            }
        })
        .catch(() => {
            statusText.innerText = "Ошибка связи с сервером.";
            statusText.style.color = "red";
            buildBtn.disabled = false;
            buildBtn.style.background = "#2ecc71";
        });
    }

    function checkForReadyAPK() {
        const checkInterval = setInterval(() => {
            fetch(`https://github.com{GITHUB_USERNAME}/${GITHUB_REPO}/releases`)
            .then(res => res.json())
            .then(releases => {
                if (releases && releases.length > 0) {
                    const latestRelease = releases[0];
                    if (latestRelease.assets && latestRelease.assets.length > 0) {
                        const apkAsset = latestRelease.assets.find(asset => asset.name.endsWith('.apk'));
                        if (apkAsset) {
                            clearInterval(checkInterval);
                            statusText.innerText = "Ваше приложение успешно собрано! Получите файл ниже: 🎉";
                            statusText.style.color = "green";
                            downloadBtn.href = apkAsset.browser_download_url;
                            downloadBtn.style.display = "block";
                        }
                    }
                }
            })
            .catch(err => console.log("Ожидание готовности файла..."));
        }, 7000);
    }
</script>
</body>
</html>
