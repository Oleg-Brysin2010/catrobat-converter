name: Сборщик Catrobat в APK

on:
  workflow_dispatch:
  repository_dispatch:
    types: [start-build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем файлы нашего репозитория
    - name: Проверка репозитория
      uses: actions/checkout@v4

    # 2. Устанавливаем Node.js (нужен для веб-сборщика)
    - name: Установка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 3. УСТАНАВЛИВАЕМ JAVA 21 (Это исправит ошибку invalid source release)
    - name: Установка Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 4. Создаем папку для приложения и скачиваем плеер
    - name: Подготовка веб-плеера Catrobat
      run: |
        mkdir -p www
        curl -L -o www/player.js https://catrob.at || echo "console.log('Ошибка плеера')" > www/player.js
        echo "Веб-плеер успешно подготовлен!"

    # 5. Получаем файл пользователя
    - name: Загрузка файла проекта пользователя
      run: |
        if [ "${{ github.event.client_payload.file_url }}" != "" ]; then
          curl -L -o project.catrobat "${{ github.event.client_payload.file_url }}"
        else
          echo "Ручной запуск! Создаем тестовый проект..."
          echo "test" > test.txt
          zip project.catrobat test.txt
        fi

    # 6. Распаковываем проект внутрь веб-сборки
    - name: Интеграция проекта в приложение
      run: |
        mkdir -p www/project
        unzip -o project.catrobat -d www/project/
        
        # Создаем стартовый файл для запуска игры
        echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"><script src="player.js"></script><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}#pocketCodePlayer{width:100%;height:100%}</style></head><body><div id="pocketCodePlayer"></div><script>document.addEventListener("DOMContentLoaded", function(){ if(typeof PocketCode !== "undefined") { PocketCode.App.init("project/"); } });</script></body></html>' > www/index.html
        echo "Проект упакован в HTML5!"

    # 7. Собираем лёгкий APK-пакет через Android SDK
    - name: Сборка веб-пакета приложения
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android
        npx cap init "CatrobatApp" "com.yourconverter.app" --web-dir=www
        npx cap add android
        cd android && ./gradlew assembleDebug

    # 8. Отдаем готовый рабочий файл APK
    - name: Загрузка готового APK в облако GitHub
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/debug/*.apk
